name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./tmp/ci.db
      VITE_APP_MODE: demo
      PRISMA_CONNECTION_LIMIT: "5"
      PRISMA_POOL_TIMEOUT: "10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npm run build
